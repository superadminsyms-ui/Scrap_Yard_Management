#project name
spring.application.name=management


#Database config
spring.datasource.url=jdbc:mysql://localhost:3306/db_scrapyardm
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Spring2026.*}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#jpa update for development
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=1800000

#spring automatic documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Backup configuration
app.backup.dir=${BACKUP_DIR:${user.home}/backups/scrapyard}
app.backup.max-files=10
app.backup.max-upload-size-mb=10

# CORS configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Multipart file upload (for backup uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=-1


