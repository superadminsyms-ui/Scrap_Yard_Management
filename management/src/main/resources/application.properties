#project name
spring.application.name=management


#Database config
spring.datasource.url=jdbc:mysql://localhost:3306/db_scrapyardm?serverTimezone=America/Jamaica
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Spring2026.*}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

#jpa update for development
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=1800000

#spring automatic documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Backup configuration
app.backup.dir=${BACKUP_DIR:${user.home}/backups/scrapyard}
app.backup.max-files=10
app.backup.max-upload-size-mb=10

# CORS configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Jackson date/time configuration
spring.jackson.time-zone=America/Jamaica
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# Security configuration
app.security.inactivity-timeout-minutes=${INACTIVITY_TIMEOUT:15}

# Email SMTP Configuration (Gmail)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:superadminsyms@gmail.com}
spring.mail.password=${MAIL_PASSWORD:rstu rlfx opit wulq}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password Reset Configuration
app.password-reset.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.password-reset.token-expiration-minutes=${RESET_TOKEN_EXPIRATION:10}
app.password-reset.cleanup-rate-ms=3600000

# Multipart file upload (for backup uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=-1


